<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<title>EOD Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/base.css?v=1">
<link rel="stylesheet" href="/static/css/dashboard.css?v=1">
</head>
<body>
<header class="app-header">
<div><div class="brand-title">EOD Command Center</div><div class="brand-subtitle">Live monitoring pentru magazine</div></div>
<div class="header-actions">
<div class="live-pill" id="liveState"><span class="live-dot"></span>Live</div>
<button class="btn" onclick="loadDashboard()">Refresh</button>
</div>
</header>
<main class="container">
<section class="hero-panel">
<div><div class="hero-eyebrow">Operational overview</div><h1>Store Fleet Health</h1><p>Dashboard pentru monitorizarea EOD și a agenților.</p></div>
<div class="hero-meta"><div class="small">Last refresh</div><div class="hero-time" id="lastUpdate">-</div></div>
</section>
<section class="summary-grid">
<div class="summary-card"><div class="summary-label">Stores</div><div class="summary-value" id="totalStores">0</div></div>
<div class="summary-card ok-card"><div class="summary-label">Healthy</div><div class="summary-value" id="okStores">0</div></div>
<div class="summary-card warn-card"><div class="summary-label">Problems</div><div class="summary-value" id="problemStores">0</div></div>
<div class="summary-card bad-card"><div class="summary-label">Offline</div><div class="summary-value" id="offlineStores">0</div></div>
</section>
<section class="toolbar-panel">
<input id="searchInput" class="search-input" placeholder="Caută magazin..." oninput="renderDashboard()">
<div class="filter-group">
<button class="filter-btn active" data-filter="ALL" onclick="setFilter('ALL')">All</button>
<button class="filter-btn" data-filter="OK" onclick="setFilter('OK')">OK</button>
<button class="filter-btn" data-filter="PROBLEM" onclick="setFilter('PROBLEM')">Problems</button>
<button class="filter-btn" data-filter="OFFLINE" onclick="setFilter('OFFLINE')">Offline</button>
</div></section>
<section class="store-grid" id="storeGrid"><div class="loading-card">Loading telemetry...</div></section>
</main>
<script src="/static/js/dashboard.js?v=1"></script>
</body></html>
